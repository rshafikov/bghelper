# .goreleaser.yml
# Configuration for GoReleaser

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: bgh
    main: ./cmd/bghelper
    binary: bgh
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildTime={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - docs/*

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - 'merge conflict'
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy

release:
  github:
    owner: ra.shafikov
    name: bghelper
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## bghelper {{ .Version }}

    A CLI tool for managing background processes.

    ### Installation

    Download the appropriate binary for your platform from the assets below.

    #### macOS/Linux
    ```bash
    # Download and extract
    tar -xzf bghelper_{{ .Version }}_darwin_amd64.tar.gz
    sudo mv bgh /usr/local/bin/
    ```

    #### Windows
    Extract the zip file and add `bgh.exe` to your PATH.

brews:
  - name: bgh
    homepage: "https://github.com/ra.shafikov/bghelper"
    description: "A CLI tool for managing background processes"
    repository:
      owner: ra.shafikov
      name: homebrew-tap
    directory: Formula
    test: |
      system "#{bin}/bgh version"
    install: |
      bin.install "bgh"
